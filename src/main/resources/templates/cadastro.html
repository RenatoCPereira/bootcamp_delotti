<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- jQuery + máscara -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- MENSAGEM DE SUCESSO -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="fa fa-check-circle"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">

                <div class="card-header bg-primary text-white text-center">

                    <h4>
                        <i class="fa"
                           th:classappend="${usuario.id} != null ? 'fa-edit' : 'fa-user-plus'"></i>

                        <span th:text="${usuario.id != null ? 'Editar Usuário' : 'Cadastro de Usuário'}"></span>
                    </h4>

                </div>

                <div class="card-body">

                    <!-- FORM DINÂMICO -->
                    <form th:action="${usuario.id} != null ?
                                     @{/usuarios/atualizar/{id}(id=${usuario.id})} :
                                     @{/usuarios/salvar}"
                          th:object="${usuario}"
                          method="post">

                        <input type="hidden" th:field="*{id}" />

                        <!-- NOME -->
                        <div class="mb-3">
                            <label class="form-label">Nome</label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-user"></i>
                                </span>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{nome}">
                            </div>

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('nome')}"
                                   th:errors="*{nome}"></small>
                        </div>

                        <!-- CPF -->
                        <div class="mb-3">
                            <label class="form-label">CPF</label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-id-card"></i>
                                </span>

                                <input type="text"
                                       id="cpf"
                                       class="form-control"
                                       th:field="*{cpf}">
                            </div>

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('cpf')}"
                                   th:errors="*{cpf}"></small>
                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-envelope"></i>
                                </span>

                                <input type="email"
                                       class="form-control"
                                       th:field="*{email}">
                            </div>

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('email')}"
                                   th:errors="*{email}"></small>
                        </div>

                        <!-- SENHA -->
                        <div class="mb-3">
                            <label class="form-label">Senha</label>

                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fa fa-lock"></i>
                                </span>

                                <input type="password"
                                       id="senha"
                                       class="form-control"
                                       th:field="*{senha}">

                                <button type="button"
                                        class="btn btn-outline-secondary"
                                        onclick="mostrarSenha()">
                                    <i class="fa fa-eye"></i>
                                </button>
                            </div>

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('senha')}"
                                   th:errors="*{senha}"></small>

                            <div class="progress mt-2">
                                <div id="forcaSenha" class="progress-bar"></div>
                            </div>
                        </div>

                        <!-- DATA NASCIMENTO -->
                        <div class="mb-3">
                            <label class="form-label">Data de Nascimento</label>

                            <input type="date"
                                   class="form-control"
                                   th:field="*{dataNascimento}">

                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('dataNascimento')}"
                                   th:errors="*{dataNascimento}"></small>
                        </div>

                        <!-- BOTÕES -->
                        <div class="d-grid gap-2">

                            <button class="btn btn-success">

                                <i class="fa"
                                   th:classappend="${usuario.id} != null ? 'fa-edit' : 'fa-save'"></i>

                                <span th:text="${usuario.id != null ? 'Atualizar' : 'Cadastrar'}"></span>

                            </button>

                            <a href="/usuarios/listar" class="btn btn-secondary">
                                <i class="fa fa-arrow-left"></i>
                                Voltar para lista
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Scripts -->
<script>
    $('#cpf').mask('000.000.000-00');

    function mostrarSenha(){
        let campo = document.getElementById("senha");
        campo.type = campo.type === "password" ? "text" : "password";
    }

    $('#senha').keyup(function(){
        let senha = $(this).val();
        let forca = 0;

        if(senha.length > 5) forca += 25;
        if(senha.match(/[A-Z]/)) forca += 25;
        if(senha.match(/[0-9]/)) forca += 25;
        if(senha.match(/[^A-Za-z0-9]/)) forca += 25;

        $('#forcaSenha').css("width", forca + "%");
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
