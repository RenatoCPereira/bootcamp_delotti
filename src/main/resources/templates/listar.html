<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- MENSAGEM DE SUCESSO -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="fa fa-check-circle"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>
            <i class="fa fa-users"></i>
            Lista de Usuários
        </h3>

        <a href="/usuarios/cadastro" class="btn btn-success">
            <i class="fa fa-plus"></i>
            Novo Usuário
        </a>

    </div>

    <!-- CARD -->
    <div class="card shadow">

        <div class="card-body">

            <table class="table table-hover table-striped text-center align-middle">

                <!-- CABEÇALHO -->
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>CPF</th>
                    <th>Data Nascimento</th>
                    <th>Ações</th>
                </tr>
                </thead>

                <!-- CORPO -->
                <tbody>

                <!-- CASO NÃO TENHA DADOS -->
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="6">
                        <div class="alert alert-warning mb-0">
                            Nenhum usuário cadastrado
                        </div>
                    </td>
                </tr>

                <!-- LISTA -->
                <tr th:each="usuario : ${usuarios}">

                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.nome}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td th:text="${usuario.cpf}"></td>
                    <td th:text="${usuario.dataNascimento}"></td>

                    <td>

                        <!-- EDITAR -->
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}"
                           class="btn btn-warning btn-sm me-1"
                           title="Editar">

                            <i class="fa fa-edit"></i>

                        </a>

                        <!-- DELETAR -->
                        <a th:href="@{/usuarios/deletar/{id}(id=${usuario.id})}"
                           class="btn btn-danger btn-sm"
                           title="Deletar"
                           onclick="return confirm('Tem certeza que deseja excluir este usuário?')">

                            <i class="fa fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- Bootstrap JS (para fechar alerta) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
